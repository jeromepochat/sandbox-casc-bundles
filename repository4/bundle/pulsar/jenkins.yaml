unclassified:
  rules:
    rules:
    - pattern: ".*[/\\\\]upload[/\\\\].*(\"|%22).*[/\\\\](upload|complete).*"
      response:
        code: 403
        content: |-
          <h1>Forbidden call</h1>
          For more information, please visit the <a href="https://cloudbees.com/r/block-url-pattern">following page</a>
          or <a href="https://support.cloudbees.com">contact CloudBees support</a> mentioning SECURITY-2349.
        contentType: "text/html"
  globalLibraries:
    libraries:
    - defaultVersion: "develop"
      name: "pulsar-lib"
      retriever:
        modernSCM:
          scm:
            git:
              credentialsId: "bundles"
              id: "5fcbf855-d879-4128-aa45-7afb05c87e6a"
              remote: "https://github.com/escoem/testing-pipeline-library.git"
              traits:
              - "gitBranchDiscovery"
tool:
  maven:
    installations:
    - name: "maven-3.6.3"
      properties:
      - installSource:
          installers:
          - maven:
              id: "3.6.3"
