removeStrategy:
  items: "none"
  rbac: "sync"

items:
  - kind: "folder"
    displayName: "Folder with FreeStyle"
    name: "folder-with-freeStyle"
    description: "A folder with a FreeStyle Project iside"
    healthMetrics:
      - worstChildHealthMetric:
          recursive: false
      - averageChildHealthMetric: {}
      - jobStatusHealthMetric:
          unstable: true
          countVirginJobs: true
          failure: true
          success: true
          unbuilt: true
      - projectEnabledHealthMetric: {}
    properties:
      - envVars:
          vars:
            SKIP_WINDOWS: true
            JIRA_PROJECT: BEE
      - folderLibraries:
          libraries:
            - libraryConfiguration:
                implicit: false
                allowVersionOverride: true
                retriever:
                  modernSCM:
                    scm:
                      github:
                        traits:
                          - gitHubBranchDiscovery:
                              strategyId: 1
                          - gitHubPullRequestDiscovery:
                              strategyId: 1
                          - gitHubForkDiscovery:
                              trust:
                                gitHubTrustEveryone: {}
                              strategyId: 1
                        repoOwner: "cloudbees"
                        id: "library-id"
                        repository: "rosie-libs"
                        configuredByUrl: true
                        repositoryUrl: "https://github.com/cloudbees/rosie-libs"
                name: "my-library"
                includeInChangesets: true
      - itemRestrictions:
          allowedTypes:
            - "hudson.model.FreeStyleProject"
            - "com.cloudbees.hudson.plugins.folder.Folder"
          filter: true
    items:
      - kind: "freeStyle"
        displayName: "FreeStyle Job in the folder"
        name: "child-empty-project"
